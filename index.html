<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twistigo | Türkiye'nin En Büyük E-Ticaret Platformu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6700;
            --primary-light: #ff8c00;
            --primary-dark: #e55a00;
            --secondary: #2d3436;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --bg-light: #f8f9fa;
            --bg-white: #ffffff;
            --border-color: #e0e0e0;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-lg: 0 15px 40px rgba(0,0,0,0.16);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body.dark-mode {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }

        /* HEADER */
        header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        body.dark-mode header {
            background-color: #2a2a2a;
            border-bottom-color: #444;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .search-header {
            flex: 1;
            max-width: 500px;
        }

        .search-header input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-light);
            outline: none;
            transition: all 0.3s;
        }

        .search-header input:focus {
            border-color: var(--primary);
            background: var(--bg-white);
        }

        body.dark-mode .search-header input {
            background: #333;
            border-color: #444;
            color: #e0e0e0;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.3s;
            position: relative;
        }

        .icon-btn:hover {
            transform: scale(1.1);
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        /* NAV */
        .navbar {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            padding: 0;
        }

        body.dark-mode .navbar {
            background-color: #2a2a2a;
            border-bottom-color: #444;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .nav-container::-webkit-scrollbar {
            display: none;
        }

        .nav-item {
            padding: 15px 20px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            color: var(--text-secondary);
        }

        .nav-item:hover {
            color: var(--primary);
            background: var(--bg-light);
        }

        body.dark-mode .nav-item:hover {
            background: #333;
        }

        .nav-item.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* BANNER */
        .banner-section {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .banner {
            background: var(--gradient);
            border-radius: 16px;
            padding: 40px;
            color: white;
            text-align: center;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .banner::before {
            content: '';
            position: absolute;
            right: -50px;
            top: -50px;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .banner-content {
            position: relative;
            z-index: 2;
        }

        .banner h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .banner p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .banner-btn {
            background: white;
            color: var(--primary);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }

        .banner-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* MAIN CONTENT */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        /* FILTER SECTION */
        .filter-section {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .sidebar-filters {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            box-shadow: var(--shadow-sm);
        }

        body.dark-mode .sidebar-filters {
            background-color: #2a2a2a;
        }

        .filter-title {
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 14px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .filter-group {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        body.dark-mode .filter-group {
            border-bottom-color: #444;
        }

        .filter-group:last-child {
            border-bottom: none;
        }

        .filter-option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .filter-option input {
            margin-right: 10px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .filter-option label {
            cursor: pointer;
            font-size: 14px;
            flex: 1;
        }

        /* PRODUCTS GRID */
        .products-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-white);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }

        body.dark-mode .products-header {
            background-color: #2a2a2a;
        }

        .sort-select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-white);
            cursor: pointer;
            transition: all 0.3s;
        }

        body.dark-mode .sort-select {
            background-color: #333;
            border-color: #444;
            color: #e0e0e0;
        }

        .sort-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        @media (max-width: 1200px) {
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
            .filter-section {
                grid-template-columns: 1fr;
            }
            .sidebar-filters {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* PRODUCT CARD */
        .product-card {
            background: var(--bg-white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
        }

        body.dark-mode .product-card {
            background-color: #2a2a2a;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .product-image-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: var(--bg-light);
        }

        body.dark-mode .product-image-wrapper {
            background-color: #333;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .product-badge.new {
            background: var(--success);
        }

        .product-badge.sale {
            background: var(--danger);
        }

        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
        }

        .favorite-btn:hover {
            transform: scale(1.1);
        }

        .favorite-btn.favorited {
            color: var(--danger);
        }

        .product-info {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.3;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        body.dark-mode .product-name {
            color: #e0e0e0;
        }

        .product-rating {
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .product-prices {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 800;
            color: var(--primary);
        }

        .product-old-price {
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: line-through;
        }

        .product-discount {
            font-size: 12px;
            color: var(--danger);
            font-weight: 700;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--border-color) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: auto;
            color: var(--text-primary);
        }

        .add-to-cart-btn:hover {
            background: var(--gradient);
            color: white;
            transform: translateY(-2px);
        }

        body.dark-mode .add-to-cart-btn {
            background: linear-gradient(135deg, #333 0%, #444 100%);
            color: #e0e0e0;
        }

        /* PAGINATION */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 40px 0;
        }

        .pagination-btn {
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            background: var(--bg-white);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        body.dark-mode .pagination-btn {
            background-color: #2a2a2a;
            border-color: #444;
            color: #e0e0e0;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .pagination-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-white);
            max-width: 600px;
            width: 90%;
            border-radius: 16px;
            padding: 30px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        body.dark-mode .modal-content {
            background-color: #2a2a2a;
            color: #e0e0e0;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .modal-seller {
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .modal-rating {
            background: var(--bg-light);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        body.dark-mode .modal-rating {
            background-color: #333;
        }

        .reviews-section {
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        body.dark-mode .reviews-section {
            border-top-color: #444;
        }

        .review-item {
            background: var(--bg-light);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        body.dark-mode .review-item {
            background-color: #333;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 600;
        }

        /* CART SIDEBAR */
        #cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            height: 100vh;
            background: var(--bg-white);
            z-index: 1500;
            transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        body.dark-mode #cart-sidebar {
            background-color: #2a2a2a;
        }

        #cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.dark-mode .cart-header {
            border-bottom-color: #444;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            align-items: start;
        }

        body.dark-mode .cart-item {
            border-bottom-color: #444;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info h4 {
            font-size: 13px;
            margin-bottom: 5px;
        }

        .cart-item-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0 5px;
        }

        body.dark-mode .cart-item-qty {
            border-color: #444;
        }

        .cart-item-qty button {
            background: none;
            border: none;
            cursor: pointer;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-item-remove {
            cursor: pointer;
            color: var(--danger);
            font-size: 18px;
            text-align: center;
        }

        .cart-footer {
            border-top: 1px solid var(--border-color);
            padding: 20px;
        }

        body.dark-mode .cart-footer {
            border-top-color: #444;
        }

        .cart-summary {
            margin-bottom: 15px;
        }

        .cart-summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .cart-summary-row.total {
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            font-weight: 800;
            font-size: 16px;
            color: var(--primary);
        }

        body.dark-mode .cart-summary-row.total {
            border-top-color: #444;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-white);
            border-top: 1px solid var(--border-color);
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 0;
            padding: 0;
            z-index: 999;
        }

        body.dark-mode .bottom-nav {
            background-color: #2a2a2a;
            border-top-color: #444;
        }

        @media (max-width: 768px) {
            .bottom-nav {
                display: grid;
            }
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-secondary);
            font-size: 12px;
            gap: 5px;
        }

        .bottom-nav-item:hover,
        .bottom-nav-item.active {
            color: var(--primary);
        }

        .bottom-nav-icon {
            font-size: 24px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header-top {
                flex-direction: column;
                gap: 10px;
            }

            .search-header {
                max-width: 100%;
            }

            .filter-section {
                grid-template-columns: 1fr;
                margin: 20px 0;
            }

            .sidebar-filters {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                height: auto;
                gap: 15px;
            }

            .filter-group {
                border: none;
                margin: 0;
                padding: 0;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }

            #cart-sidebar {
                width: 100%;
            }

            body {
                padding-bottom: 70px;
            }
        }

        /* UTILS */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            z-index: 3000;
            animation: slideInUp 0.3s ease;
        }

        @keyframes slideInUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
            <div class="logo" onclick="goHome()">🚀 Twistigo</div>
            <div class="search-header">
                <input type="text" id="search-input" placeholder="Ürün, kategori veya marka ara...">
            </div>
            <div class="header-icons">
                <button class="icon-btn" onclick="toggleDarkMode()">🌙</button>
                <button class="icon-btn" onclick="openFavorites()">
                    ❤️
                    <span class="badge" id="favorites-badge" style="display:none;">0</span>
                </button>
                <button class="icon-btn" onclick="toggleCart()">
                    🛒
                    <span class="badge" id="cart-count-badge">0</span>
                </button>
                <button class="icon-btn" onclick="openProfile()">👤</button>

            { id: 46, name: "Dumbbells Seti (20kg)", category: "Spor & Outdoor", price: 899, oldPrice: 1399, rating: 4.7, sales: 1240, image: "https://images.unsplash.com/photo-1538805060582-56c696c22868?auto=format&fit=crop&q=80&w=500", seller: "Fitness Hub", isNew: true, discount: 36, reviews: [{ user: "Murat", rating: 5, text: "Evde antrenman için ideal" }] },

            { id: 50, name: "Bilişim Başlangıç Rehberi", category: "Kitap & Medya", price: 249, oldPrice: 399, rating: 4.6, sales: 1890, image: "https://images.unsplash.com/photo-1495446815901-a7297e3eda06?auto=format&fit=crop&q=80&w=500", seller: "Tech Books", isNew: true, discount: 38, reviews: [{ user: "Yusuf", rating: 5, text: "Başlayıcılar için mükemmel" }] },

            // DAHA FAZLA ÜRÜN EKLEYEBİLİRSİNİZ
            { id: 51, name: "Laptop Sırt Çantası", category: "Aksesuar", price: 399, oldPrice: 699, rating: 4.7, sales: 1340, image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&q=80&w=500", seller: "Bag Store", discount: 43, reviews: [{ user: "Ege", rating: 5, text: "Çok kullanışlı ve dayanıklı" }] },
            { id: 52, name: "Telefon Kıl��fı Deri", category: "Aksesuar", price: 199, oldPrice: 349, rating: 4.5, sales: 2340, image: "https://images.unsplash.com/photo-1586253408161-4674a9f17428?auto=format&fit=crop&q=80&w=500", seller: "Phone Accessories", discount: 43, reviews: [{ user: "Serra", rating: 4, text: "Kaliteli ve şık" }] },
            { id: 53, name: "Tablet Standı Ayarlanabilir", category: "Elektronik", price: 249, oldPrice: 449, rating: 4.6, sales: 1560, image: "https://images.unsplash.com/photo-1586253408161-4674a9f17428?auto=format&fit=crop&q=80&w=500", seller: "Tech Stands", discount: 44, reviews: [{ user: "Ahmet", rating: 5, text: "Çok pratik ve stabil" }] },
            { id: 54, name: "Balık Yağı Omega 3", category: "Sağlık & Beslenme", price: 299, oldPrice: 499, rating: 4.7, sales: 2100, image: "https://images.unsplash.com/photo-1587854692152-cbe660dbde0f?auto=format&fit=crop&q=80&w=500", seller: "Health Products", discount: 40, reviews: [{ user: "Nada", rating: 5, text: "Sağlığım çok iyileşti" }] },
            { id: 55, name: "Vitamin D3 Suplementi", category: "Sağlık & Beslenme", price: 199, oldPrice: 349, rating: 4.8, sales: 1780, image: "https://images.unsplash.com/photo-1587854692152-cbe660dbde0f?auto=format&fit=crop&q=80&w=500", seller: "Vitamin Store", isNew: true, discount: 43, reviews: [{ user: "Kerem", rating: 5, text: "Enerji seviyem arttı" }] }
        ];

        // STATE
        let cart = [];
        let favorites = [];
        let currentFilters = {};
        let currentPage = 1;
        const productsPerPage = 12;
        let filteredProducts = [...products];

        // INITIALIZE
        function init() {
            renderCategories();
            applyFilters();
            loadFromLocalStorage();
            updateUI();
        }

        // CATEGORIES
        function renderCategories() {
            const categories = ['Tümü', ...new Set(products.map(p => p.category))];
            const navContainer = document.getElementById('nav-categories');
            const filterContainer = document.getElementById('category-filters');

            navContainer.innerHTML = categories.map(cat => `
                <div class="nav-item ${cat === 'Tümü' ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</div>
            `).join('');

            filterContainer.innerHTML = categories.slice(1).map(cat => `
                <div class="filter-option">
                    <input type="checkbox" value="${cat}" onchange="applyFilters()">
                    <label>${cat}</label>
                </div>
            `).join('');
        }

        // FILTER BY CATEGORY
        function filterByCategory(category) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target?.classList.add('active');
            
            if(category === 'Tümü') {
                currentFilters.category = null;
            } else {
                currentFilters.category = category;
            }
            currentPage = 1;
            applyFilters();
        }

        // APPLY FILTERS
        function applyFilters() {
            filteredProducts = products.filter(p => {
                // Category filter
                if(currentFilters.category && p.category !== currentFilters.category) {
                    const selectedCategories = Array.from(document.querySelectorAll('input[type="checkbox"][value]')).filter(cb => cb.checked).map(cb => cb.value);
                    if(selectedCategories.length > 0 && !selectedCategories.includes(p.category)) return false;
                }

                // Price filter
                const priceFilter = document.querySelector('input[name="price"]:checked')?.value;
                if(priceFilter) {
                    if(priceFilter === '0-500' && p.price > 500) return false;
                    if(priceFilter === '500-1000' && (p.price < 500 || p.price > 1000)) return false;
                    if(priceFilter === '1000-5000' && (p.price < 1000 || p.price > 5000)) return false;
                    if(priceFilter === '5000+' && p.price < 5000) return false;
                }

                // Rating filter
                const ratingFilter = Array.from(document.querySelectorAll('input[type="checkbox"][value="3"], input[type="checkbox"][value="4"], input[type="checkbox"][value="5"]')).filter(cb => cb.checked).map(cb => parseInt(cb.value));
                if(ratingFilter.length > 0 && !ratingFilter.some(r => p.rating >= r)) return false;

                // Discount filter
                if(document.getElementById('discount-filter')?.checked && !p.discount) return false;

                // New filter
                if(document.getElementById('new-filter')?.checked && !p.isNew) return false;

                return true;
            });

            currentPage = 1;
            renderProducts();
        }

        // APPLY SORT
        function applySort() {
            const sortValue = document.getElementById('sort-select').value;

            switch(sortValue) {
                case 'price-asc':
                    filteredProducts.sort((a, b) => a.price - b.price);
                    break;
                case 'price-desc':
                    filteredProducts.sort((a, b) => b.price - a.price);
                    break;
                case 'rating':
                    filteredProducts.sort((a, b) => b.rating - a.rating);
                    break;
                case 'sales':
                    filteredProducts.sort((a, b) => b.sales - a.sales);
                    break;
                default: // newest
                    filteredProducts.sort((a, b) => b.id - a.id);
            }

            currentPage = 1;
            renderProducts();
        }

        // RENDER PRODUCTS
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const start = (currentPage - 1) * productsPerPage;
            const end = start + productsPerPage;
            const pageProducts = filteredProducts.slice(start, end);

            if(pageProducts.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">😢 Aradığınız ürün bulunamadı</div>';
                document.getElementById('pagination').innerHTML = '';
                document.getElementById('results-count').textContent = 'Sonuç yok';
                return;
            }

            grid.innerHTML = pageProducts.map(p => `
                <div class="product-card">
                    <div class="product-image-wrapper">
                        <img src="${p.image}" class="product-image" onclick="openProductModal(${p.id})">
                        ${p.isNew ? '<span class="product-badge new">YENİ</span>' : ''}
                        ${p.discount ? `<span class="product-badge sale">-${p.discount}%</span>` : ''}
                        <button class="favorite-btn ${favorites.includes(p.id) ? 'favorited' : ''}" onclick="toggleFavorite(${p.id}, event)">
                            ${favorites.includes(p.id) ? '❤️' : '🤍'}
                        </button>
                    </div>
                    <div class="product-info">
                        <div class="product-category">${p.category}</div>
                        <h3 class="product-name" onclick="openProductModal(${p.id})">${p.name}</h3>
                        <div class="product-rating">⭐ ${p.rating.toFixed(1)} (${p.sales})</div>
                        <div class="product-prices">
                            <span class="product-price">${p.price} TL</span>
                            <span class="product-old-price">${p.oldPrice} TL</span>
                        </div>
                        <button class="add-to-cart-btn" onclick="addToCart(${p.id})">Sepete Ekle</button>
                    </div>
                </div>
            `).join('');

            renderPagination();
            document.getElementById('results-count').textContent = `${filteredProducts.length} ürün bulundu`;
        }

        // PAGINATION
        function renderPagination() {
            const totalPages = Math.ceil(filteredProducts.length / productsPerPage);
            const pagination = document.getElementById('pagination');

            if(totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            
            if(currentPage > 1) {
                html += `<button class="pagination-btn" onclick="goToPage(${currentPage - 1})">← Önceki</button>`;
            }

            for(let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            if(currentPage < totalPages) {
                html += `<button class="pagination-btn" onclick="goToPage(${currentPage + 1})">Sonraki →</button>`;
            }

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderProducts();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // PRODUCT MODAL
        function openProductModal(id) {
            const product = products.find(p => p.id === id);
            const modal = document.getElementById('product-modal');
            const discountPercent = product.discount || 0;
            const savedAmount = product.oldPrice - product.price;

            const reviewsHTML = product.reviews.map(r => `
                <div class="review-item">
                    <div class="review-header">
                        <span>${r.user}</span>
                        <span>${'⭐'.repeat(r.rating)}</span>
                    </div>
                    <div>${r.text}</div>
                </div>
            `).join('');

            document.getElementById('modal-body').innerHTML = `
                <img src="${product.image}" class="modal-image">
                <h2 class="modal-title">${product.name}</h2>
                <p class="modal-seller">Satıcı: <b>${product.seller}</b></p>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <span style="background: #fff3e0; padding: 5px 10px; border-radius: 6px; font-size: 13px;">⭐ ${product.rating}/5</span>
                    <span style="background: #f0f0f0; padding: 5px 10px; border-radius: 6px; font-size: 13px;">📦 ${product.sales} satış</span>
                    ${product.discount ? `<span style="background: #ffe0e0; padding: 5px 10px; border-radius: 6px; font-size: 13px; color: #e74c3c;">-${product.discount}% İndirim</span>` : ''}
                </div>
                <div style="background: linear-gradient(135deg, #fff9f0 0%, #ffe8d6 100%); padding: 15px; border-radius: 12px; margin-bottom: 15px;">
                    <div style="display: flex; align-items: baseline; gap: 10px;">
                        <span style="font-size: 28px; font-weight: 800; color: var(--primary);">${product.price} TL</span>
                        <span style="text-decoration: line-through; color: #999;">${product.oldPrice} TL</span>
                    </div>
                    <div style="font-size: 12px; color: var(--primary); margin-top: 5px;">💰 ${savedAmount} TL tasarruf et</div>
                </div>
                <button onclick="addToCart(${product.id}); closeModal();" style="width: 100%; padding: 15px; background: var(--gradient); color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; margin-bottom: 15px;">Sepete Ekle</button>
                <div class="reviews-section">
                    <h3>📝 Kullanıcı Yorumları (${product.reviews.length})</h3>
                    ${reviewsHTML || '<p style="color: var(--text-secondary);">Henüz yorum yok</p>'}
                </div>
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.remove('active');
        }

        // FAVORITES
        function toggleFavorite(id, event) {
            event.stopPropagation();
            if(favorites.includes(id)) {
                favorites = favorites.filter(fav => fav !== id);
            } else {
                favorites.push(id);
            }
            updateUI();
            saveToLocalStorage();
        }

        function openFavorites() {
            const favoriteProducts = products.filter(p => favorites.includes(p.id));
            alert(`❤️ Favoriler (${favorites.length} ürün):\n\n${favoriteProducts.map(p => p.name).join('\n') || 'Henüz favori yok'}`);
        }

        // CART
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if(existing) {
                existing.qty += 1;
            } else {
                cart.push({...product, qty: 1});
            }

            showToast(`✅ "${product.name}" sepete eklendi!`);
            updateUI();
            saveToLocalStorage();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateUI();
            saveToLocalStorage();
        }

        function updateQuantity(id, delta) {
            const item = cart.find(item => item.id === id);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) {
                    removeFromCart(id);
                } else {
                    updateUI();
                    saveToLocalStorage();
                }
            }
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        function updateUI() {
            // Update cart badge
            document.getElementById('cart-count-badge').textContent = cart.reduce((sum, item) => sum + item.qty, 0);

            // Update favorites badge
            if(favorites.length > 0) {
                document.getElementById('favorites-badge').textContent = favorites.length;
                document.getElementById('favorites-badge').style.display = 'flex';
            } else {
                document.getElementById('favorites-badge').style.display = 'none';
            }

            // Update cart items
            const cartItemsContainer = document.getElementById('cart-items');
            if(cart.length === 0) {
                cartItemsContainer.innerHTML = '<div style="text-align: center; padding: 40px 20px; color: var(--text-secondary);">🛒 Sepetiniz boş</div>';
                document.getElementById('checkout-btn').disabled = true;
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.image}" class="cart-item-image">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>${item.price} TL × ${item.qty}</p>
                        </div>
                        <div class="cart-item-qty">
                            <button onclick="updateQuantity(${item.id}, -1)">−</button>
                            <span style="width: 20px; text-align: center;">${item.qty}</span>
                            <button onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                        <div class="cart-item-remove" onclick="removeFromCart(${item.id})">🗑️</div>
                    </div>
                `).join('');
                document.getElementById('checkout-btn').disabled = false;
            }

            // Update totals
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const tax = Math.round(subtotal * 0.18);
            const shipping = subtotal > 250 ? 0 : 30;
            const total = subtotal + tax + shipping;

            document.getElementById('subtotal').textContent = `${subtotal.toLocaleString('tr-TR')} TL`;
            document.getElementById('tax').textContent = `${tax.toLocaleString('tr-TR')} TL`;
            document.getElementById('shipping').textContent = shipping === 0 ? 'Ücretsiz' : `${shipping} TL`;
            document.getElementById('total-price').textContent = `${total.toLocaleString('tr-TR')} TL`;

            // Update all favorite buttons
            document.querySelectorAll('.favorite-btn').forEach(btn => {
                const productCard = btn.closest('.product-card');
                const isFavorited = favorites.some(fav => productCard?.querySelector('.product-name')?.textContent?.includes(''));
            });
        }

        // CHECKOUT
        function checkout() {
            if(cart.length === 0) {
                alert('Sepetiniz boş!');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const tax = Math.round(total * 0.18);
            const shipping = total > 250 ? 0 : 30;
            const finalTotal = total + tax + shipping;

            const orderSummary = cart.map(item => `${item.name} (x${item.qty}): ${item.price * item.qty} TL`).join('\n');

            const confirmed = confirm(`
✅ ÖDEME ÖZETI

${orderSummary}

Ürünler: ${total} TL
Vergi: ${tax} TL
Kargo: ${shipping === 0 ? 'Ücretsiz' : shipping + ' TL'}

TOPLAM: ${finalTotal} TL

Ödemeyi tamamlamak istiyor musunuz?
            `);

            if(confirmed) {
                alert('🎉 Ödemeniz başarıyla gerçekleştirildi!\n\nSiparişiniz kargo ile yolda olacak.\nTakip numaranız: ORD-' + Date.now());
                cart = [];
                updateUI();
                toggleCart();
                saveToLocalStorage();
            }
        }

        // SEARCH
        function handleSearch(query) {
            if(!query.trim()) {
                applyFilters();
                return;
            }

            filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(query.toLowerCase()) ||
                p.category.toLowerCase().includes(query.toLowerCase()) ||
                p.seller.toLowerCase().includes(query.toLowerCase())
            );

            currentPage = 1;
            renderProducts();
        }

        document.getElementById('search-input')?.addEventListener('input', (e) => {
            handleSearch(e.target.value);
        });

        // DARK MODE
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        // MISC FUNCTIONS
        function goHome() {
            currentPage = 1;
            currentFilters = {};
            document.getElementById('sort-select').value = 'newest';
            document.getElementById('search-input').value = '';
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
            applyFilters();
        }

        function openSearch() {
            document.getElementById('search-input').focus();
        }

        function openProfile() {
            alert('👤 Hesabım\n\nKullanıcı: Ziyaretçi\n\nGiriş yap veya kayıt ol özelliği yakında!');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // LOCAL STORAGE
        function saveToLocalStorage() {
            localStorage.setItem('twistigo_cart', JSON.stringify(cart));
            localStorage.setItem('twistigo_favorites', JSON.stringify(favorites));
        }

        function loadFromLocalStorage() {
            const savedCart = localStorage.getItem('twistigo_cart');
            const savedFavorites = localStorage.getItem('twistigo_favorites');

            if(savedCart) cart = JSON.parse(savedCart);
            if(savedFavorites) favorites = JSON.parse(savedFavorites);

            const darkMode = localStorage.getItem('darkMode');
            if(darkMode === 'true') {
                document.body.classList.add('dark-mode');
            }
        }

        // KEYBOARD SHORTCUTS
        document.addEventListener('keydown', (e) => {
            if(e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search-input').focus();
            }
        });

        // CLOSE MODAL ON OUTSIDE CLICK
        document.getElementById('product-modal')?.addEventListener('click', (e) => {
            if(e.target.id === 'product-modal') closeModal();
        });

        // START
        init();
    </script>
